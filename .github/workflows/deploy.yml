name: MkDocs Build & Deploy

on:
  push:
    branches: [ master, actions ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: pdm-project/setup-pdm@main
        name: Setup Python and PDM
        with:
          python-version: 3.13

      - name: Install dependencies
        run: pdm install

      - name: Build MkDocs
        run: source .venv/bin/activate && mkdocs build

      - name: Create archive
        run: tar -czvf bb.tar.gz -C site .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bb-site
          path: site.tar.gz
          retention-days: 1

      - name: Copy archive to remote server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "bb.tar.gz"
          target: "/tmp/"
          overwrite: true

      - name: Extract archive on remote server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            DEPLOY_PATH="/opt/bb/$SHORT_SHA"
            mkdir -p $DEPLOY_PATH
            tar -xzf /tmp/bb.tar.gz -C $DEPLOY_PATH
            ln -sfn $DEPLOY_PATH /var/www/bb
            rm -f /tmp/bb.tar.gz
            echo "✅ Сайт успешно распакован в $DEPLOY_PATH"